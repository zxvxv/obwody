blueprint:
  name: "Obwody Krytyczne (Smart Recovery) v1.03"
  description: >
    System ochrony zasilania z INTELIGENTNYM POWROTEM.
    
    HISTORIA WERSJI:
    v1.03 - Poprawka błędu 'Missing input': dodano parametr 'default: {}' dla GRUPY 0, czyniąc ją opcjonalną i zabezpieczając stare automatyzacje przed błędami walidacji.
    v1.02 - Dodano GRUPĘ 0 (Natychmiastową) - wyłącza się bezwarunkowo przy zaniku napięcia (0 sek opóźnienia).
    v1.01 - Dodano 5-sekundową zwłokę przy wykrywaniu awarii (Anty-Flicker).
            Zapobiega to wyłączaniu przy chwilowych spadkach napięcia.
            Zaktualizowano składnię service -> action.

    0. ZANIK NAPIĘCIA (< Limit V natychmiast) -> Wyłącza GRUPĘ 0 (Natychmiastowa).
    1. AWARIA SIECI (< Limit V przez 5s) -> Wyłącza GRUPĘ 1 (Największe odbiorniki).
    2. SŁABA BATERIA (< Limit 1) -> Wyłącza GRUPĘ 2 (Ostrzegawcze).
    3. PUSTA BATERIA (< Limit 2) -> Wyłącza GRUPĘ 3 (Reszta domu).
    
    POWRÓT ZASILANIA (Sekwencja Startu):
    Najpierw GRUPA 3 (Najważniejsze) -> potem GRUPA 2 -> potem GRUPA 1 -> na końcu GRUPA 0.
  domain: automation
  source_url: https://github.com/zxvxv/obwody/blob/main/blueprint.yaml
  input:
    # --- CZUJNIKI ---
    grid_voltage_l1:
      name: "Sensor Napięcia L1"
      default: sensor.deye_inverter_grid_l1_voltage
      selector:
        entity:
          domain: sensor
          device_class: voltage
    grid_voltage_l2:
      name: "Sensor Napięcia L2"
      default: sensor.deye_inverter_grid_l2_voltage
      selector:
        entity:
          domain: sensor
          device_class: voltage
    grid_voltage_l3:
      name: "Sensor Napięcia L3"
      default: sensor.deye_inverter_grid_l3_voltage
      selector:
        entity:
          domain: sensor
          device_class: voltage
    battery_soc:
      name: "Sensor Baterii (SOC)"
      default: sensor.deye_inverter_battery_bms_soc
      selector:
        entity:
          domain: sensor

    # --- PROGI ---
    voltage_limit:
      name: "Próg Napięcia - AWARIA (V)"
      default: 190
      selector:
        number:
          min: 150
          max: 230
          unit_of_measurement: V
          mode: box
    
    soc_limit_1:
      name: "Próg Baterii - OSTRZEGAWCZY (%)"
      default: 80
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

    soc_limit_2:
      name: "Próg Baterii - KRYTYCZNY (%)"
      default: 20
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

    # --- OBWODY ---
    targets_immediate:
      name: "GRUPA 0: Natychmiastowa / Hard Stop"
      description: "Te urządzenia gasną BEZ ZWŁOKI (0s) gdy tylko napięcie spadnie poniżej limitu."
      default: {}
      selector:
        target:
          entity:
            domain: switch

    targets_group_1:
      name: "GRUPA 1: Awaria Sieci (po 5s)"
      description: "Te urządzenia gasną PIERWSZE przy awarii (po 5s), a wstają jako jedne z ostatnich (Duże AGD)."
      default: {}
      selector:
        target:
          entity:
            domain: switch

    targets_group_2:
      name: "GRUPA 2: Słaba Bateria"
      description: "Te urządzenia gasną przy pierwszym progu (np. 80%)."
      default: {}
      selector:
        target:
          entity:
            domain: switch

    targets_group_3:
      name: "GRUPA 3: Pusta Bateria / Full Shutdown"
      description: "Te urządzenia gasną OSTATNIE, a wstają PIERWSZE (Kluczowe systemy)."
      default: {}
      selector:
        target:
          entity:
            domain: switch

    # --- POWRÓT ---
    voltage_recovery:
      name: "Próg Napięcia - POWRÓT (V)"
      default: 215
      selector:
        number:
          min: 190
          max: 250
          unit_of_measurement: V
          mode: box

trigger:
  # Wyzwalacze NATYCHMIASTOWE (v1.02) - bez parametru 'for'
  - platform: numeric_state
    entity_id: !input grid_voltage_l1
    below: !input voltage_limit
    id: grid_fail_fast
  - platform: numeric_state
    entity_id: !input grid_voltage_l2
    below: !input voltage_limit
    id: grid_fail_fast
  - platform: numeric_state
    entity_id: !input grid_voltage_l3
    below: !input voltage_limit
    id: grid_fail_fast

  # ZMIANA v1.01: Dodano 'for: 5s'. Awaria musi trwać min. 5 sekund, żeby wyłączyć prąd.
  - platform: numeric_state
    entity_id: !input grid_voltage_l1
    below: !input voltage_limit
    for: "00:00:05"
    id: grid_fail
  - platform: numeric_state
    entity_id: !input grid_voltage_l2
    below: !input voltage_limit
    for: "00:00:05"
    id: grid_fail
  - platform: numeric_state
    entity_id: !input grid_voltage_l3
    below: !input voltage_limit
    for: "00:00:05"
    id: grid_fail
  
  # Trigger SOC działa natychmiastowo (bateria nie ma "skoków" jak napięcie)
  - platform: numeric_state
    entity_id: !input battery_soc
    below: !input soc_limit_1
    id: soc_1
  - platform: numeric_state
    entity_id: !input battery_soc
    below: !input soc_limit_2
    id: soc_2
  
  # Powrót wymaga stabilizacji przez 30 sekund (bez zmian)
  - platform: numeric_state
    entity_id: !input grid_voltage_l1
    above: !input voltage_recovery
    for: "00:00:30"
    id: grid_ok
  - platform: numeric_state
    entity_id: !input grid_voltage_l2
    above: !input voltage_recovery
    for: "00:00:30"
    id: grid_ok
  - platform: numeric_state
    entity_id: !input grid_voltage_l3
    above: !input voltage_recovery
    for: "00:00:30"
    id: grid_ok

action:
  - choose:
      # Nowa akcja dla GRUPY 0 (Natychmiastowej)
      - conditions:
          - condition: trigger
            id: grid_fail_fast
        sequence:
          - action: persistent_notification.create
            data:
              title: "⚡ ZANIK NAPIĘCIA"
              message: "Napięcie spadło! Natychmiast wyłączam Grupę 0."
          - action: switch.turn_off
            target: !input targets_immediate

      # Stara akcja dla GRUPY 1 (Po 5s)
      - conditions:
          - condition: trigger
            id: grid_fail
        sequence:
          - action: persistent_notification.create
            data:
              title: "⚡ AWARIA"
              message: "Napięcie poniżej limitu przez >5s! Wyłączam Grupę 1 (Duże AGD)."
          - action: switch.turn_off
            target: !input targets_group_1
            
      - conditions:
          - condition: trigger
            id: soc_1
          # Warunek OR: Sprawdź czy chociaż jedna faza leży, zanim wyłączysz z powodu baterii
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: !input grid_voltage_l1
                below: !input voltage_limit
              - condition: numeric_state
                entity_id: !input grid_voltage_l2
                below: !input voltage_limit
              - condition: numeric_state
                entity_id: !input grid_voltage_l3
                below: !input voltage_limit
        sequence:
          - action: persistent_notification.create
            data:
              title: "🔋 BATERIA SŁABA"
              message: "Wyłączam Grupę 2."
          - action: switch.turn_off
            target: !input targets_group_2
            
      - conditions:
          - condition: trigger
            id: soc_2
          - condition: or
            conditions:
              - condition: numeric_state
                entity_id: !input grid_voltage_l1
                below: !input voltage_limit
              - condition: numeric_state
                entity_id: !input grid_voltage_l2
                below: !input voltage_limit
              - condition: numeric_state
                entity_id: !input grid_voltage_l3
                below: !input voltage_limit
        sequence:
          - action: persistent_notification.create
            data:
              title: "🪫 BATERIA KRYTYCZNA"
              message: "Wyłączam Grupę 3 (Total Shutdown)."
          - action: switch.turn_off
            target: !input targets_group_3
            
      - conditions:
          - condition: trigger
            id: grid_ok
        sequence:
          - action: persistent_notification.create
            data:
              title: "✅ POWRÓT ZASILANIA"
              message: "Sieć stabilna >30s. Przywracam zasilanie kaskadowo."
          # 1. Najpierw najważniejsze (Grupa 3)
          - delay: "00:00:05"
          - action: switch.turn_on
            target: !input targets_group_3
          # 2. Potem średnie (Grupa 2)
          - delay: "00:00:05"
          - action: switch.turn_on
            target: !input targets_group_2
          # 3. Na końcu obciążenia (Grupa 1)
          - delay: "00:00:05"
          - action: switch.turn_on
            target: !input targets_group_1
          # 4. Natychmiastowe obwody na samym końcu (Grupa 0)
          - delay: "00:00:05"
          - action: switch.turn_on
            target: !input targets_immediate
mode: restart
